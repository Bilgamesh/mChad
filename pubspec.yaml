name: mchad
description: "A free mobile client for mChat - phpBB's chat extension"
publish_to: 'none'

version: 0.9.13

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.1.5
  http: ^1.6.0
  html: ^0.15.6
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.4.1
  flutter_widget_from_html: ^0.17.1
  photo_view: ^0.15.0
  share_plus: ^12.0.1
  flutter_localizations:
    sdk: flutter
  crypto: ^3.0.7
  another_flushbar: ^1.12.32
  ota_update: ^7.0.2
  package_info_plus: ^9.0.0
  flutter_local_notifications: ^21.0.0
  background_fetch: ^1.5.0
  flutter_svg: ^2.2.2
  system_theme: ^3.1.2
  gradient_icon: ^2.0.9
  skeletonizer: ^2.1.0+1
  url_launcher: ^6.3.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/no_avatar.gif
    - assets/fonts/